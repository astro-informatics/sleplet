---
name: Update Copyright

on:
  schedule:
    - cron: 0 3 1 1 *

jobs:
  update-licence-year:
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/licence@075fa27ca4210e7ca5535ef3aa67efb0062a6f4f # v0
        with:
          licence-file: ./LICENCE.txt
          licence-token: ${{ secrets.LICENCE_PAT }}
